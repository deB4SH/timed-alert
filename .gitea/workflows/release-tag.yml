name: Build Branch

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.mvn_image }}
    steps:
      - uses: actions/checkout@v3
      - name: Copy m2 settings
        env:
          MTWOS: ${{ vars.M2_SETTINGS_PULL_PROXY }}
        run: |
          mkdir -p ~/.m2
          printf "$MTWOS" > ~/.m2/settings.xml
      - name: Set Release Version
        run: mvn -B versions:set -DnewVersion=${{ github.ref_name }} -DgenerateBackupPoms=false
      - name: Build Release
        run: mvn -B package -DskipTests -Dnative
      - name: Deploy
        env:
          registy: ${{ vars.mvn_release_repo }}
        run: mvn -B deploy:deploy -DskipTests -DdistributionManagement.releaseRepoUrl=$registy
