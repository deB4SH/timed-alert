name: Dynamic Helm Test Matrix

on:
  push:
  workflow_dispatch:

jobs:
  setup-matrix:
    name: Generate Matrix
    runs-on: ubuntu-latest
    outputs:
      folders: ${{ steps.find-folders.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Find directories and format JSON
        id: find-folders
        run: |
          # Initialize an empty array string
          JSON_ARRAY="["
          FIRST=true

          # Loop through directories in the specified path
          for dir in ./src/test/helm/*/; do
            # Check if the directory actually exists (handles empty glob)
            [ -d "$dir" ] || continue
            
            # Extract just the folder name (remove trailing slash and path)
            folder=$(basename "$dir")
            
            # Add a comma if this isn't the first item
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON_ARRAY+=", "
            fi
            
            # Append the quoted folder name
            JSON_ARRAY+="\"$folder\""
          done

          JSON_ARRAY+="]"
          
          echo "Generated JSON: $JSON_ARRAY"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  run-helm-tests:
    name: Test folder - ${{ matrix.folder }}
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        folder: ${{ fromJson(needs.setup-matrix.outputs.folders) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Step 1: Linting ${{ matrix.folder }}"
        run: |
          echo "Processing directory: ./src/test/helm/${{ matrix.folder }}"
