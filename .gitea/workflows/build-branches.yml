name: Build Branch

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.mvn_image }}
    steps:
      - uses: actions/checkout@v3
      - name: Copy m2 settings
        env:
          MTWOS: ${{ vars.M2_SETTINGS_PULL_PROXY }}
        run: |
          mkdir -p ~/.m2
          printf "$MTWOS" > ~/.m2/settings.xml
      - name: Build with Maven
        run: mvn test --file pom.xml