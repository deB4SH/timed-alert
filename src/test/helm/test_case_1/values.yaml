deployment:
  #this start the image in a sleep mode
  sleepStart: false

  replicas: ""
  revisionHistoryLimit: ""
  strategyType: ""

  image:
    registry: "ghcr.io/deb4sh/timed-alert"
    tag: "0.0.0"

  resources:
    limits:
      cpu: 500m
      memory: 1000Mi
    requests:
      cpu: 100m
      memory: 500Mi

  tolerations: { }
  #- key: "key-name"          # Required (must match a taint key)
  #          operator: "Equal"        # Optional (default: Equal)
  #          value: "value"           # Optional (if operator is Equal)
  #          effect: "NoSchedule"     # Required (NoSchedule, PreferNoSchedule, or NoExecute)

  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 120

  configuration:
    # hour configuration when the alert should be triggered
    startHour: "09"
    startMinute: "00"
    endHour: "10"
    endMinute: "00"
    #possible values: MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY SATURDAY SUNDAY
    dayOfAlert: "MONDAY"

servicemonitor:
  enabled: true