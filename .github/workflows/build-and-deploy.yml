name: Build Image and Chart

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 25
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
          settings-path: ${{ github.workspace }} # location for the settings.xml file
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814
        id: installHelm
        with:
          version: "latest"
      - name: Get Meta
        id: repometa
        run: |
          echo REPOSITORY=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_OUTPUT
          echo REPO_VERSION=${GITHUB_REF_NAME#v} >> $GITHUB_OUTPUT
      - name: Update version in pom.xml (Release only)
        run: mvn -B versions:set -DnewVersion=${{ github.ref_name }} -DgenerateBackupPoms=false
      - name: Build with Maven
        run: mvn package -Dnative -Dquarkus.native.remote-container-build=true
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker meta
        id: meta_build
        uses: docker/metadata-action@v4
        with:
          images: |
            ghcr.io/deb4sh/timed-alert
          labels: |
            org.opencontainers.image.title="Timed Alert"
            org.opencontainers.image.description="Alert Testing Tool for your selfhosted environmetn"
            org.opencontainers.image.vendor="https://github.com/${{ github.repository_owner }}"
            org.label-schema.url="https://github.com/${{ github.repository_owner }}/timed-alert"
            org.label-schema.usage="https://github.com/${{ github.repository_owner }}/timed-alert/blob/main/README.md"
            org.label-schema.schema-version="1.0"
          tags: |
            type=schedule
            type=ref,event=tag
      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          context: ./
          file: ./src/main/docker/Dockerfile.native-micro
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_build.outputs.tags }}
          labels: ${{ steps.meta_build.outputs.labels }}
      - name: Replace Version in Helm Chart  
        run: |
          sed -i "s/version: .*/version: ${{ github.ref_name }}/" src/helm/Chart.yaml
          cat src/helm/Chart.yaml
      - name: Package Helm Chart
        id: package_and_sign
        run: |
          mkdir dist
          helm package --dependency-update ./src/helm --destination dist
      - name: Push to registry
        if: github.event_name != 'pull_request'
        id: push
        run: |
          echo REPOSITORY=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]') >> $GITHUB_OUTPUT
          helm push ./dist/timed-alert-${{ github.ref_name}}.tgz oci://${{ steps.repometa.outputs.REPOSITORY }}